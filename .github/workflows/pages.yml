name: Deploy redesign (root) + prototype v1 to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - prototype-redesign/**
      - prototype/**
      - .github/workflows/pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build redesign + prototype v1
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            prototype-redesign/package-lock.json
            prototype/package-lock.json

      - name: Setup Pages
        uses: actions/configure-pages@v5

      # --- redesign (root path /backoffice-ai-v2/) — Phase 2 Process-First v2 ---
      - name: Install redesign dependencies
        working-directory: prototype-redesign
        # npm ci ではなく install: macOS 生成の lockfile が linux CI 用 optional 依存
        # (@emnapi/* = wasm fallback chain) を取りこぼし npm ci が EUSAGE で fail するため
        # (cross-platform lockfile の既知問題)。install は drift を許容しビルドを通す。
        run: npm install --no-audit --no-fund

      - name: Build redesign
        working-directory: prototype-redesign
        env:
          VITE_BASE_PATH: /backoffice-ai-v2/
        run: npm run build

      - name: Add redesign SPA fallback
        working-directory: prototype-redesign
        run: cp dist/index.html dist/404.html

      # --- prototype v1 (subpath /backoffice-ai-v2/v1/) — Session 4 demo (Plan v1.3 locked) ---
      - name: Install prototype v1 dependencies
        working-directory: prototype
        run: npm ci

      - name: Build prototype v1
        working-directory: prototype
        env:
          VITE_BASE_PATH: /backoffice-ai-v2/v1/
        run: npm run build

      - name: Add prototype v1 SPA fallback
        working-directory: prototype
        run: cp dist/index.html dist/404.html

      # --- combine into single _site (redesign at root, prototype v1 as subpath) ---
      - name: Assemble combined site
        run: |
          mkdir -p _site
          cp -R prototype-redesign/dist/. _site/
          mkdir -p _site/v1
          cp -R prototype/dist/. _site/v1/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
